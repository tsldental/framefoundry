<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; height: 100vh; background: #f5f5f5; }

    /* Sidebar */
    #sidebar { width: 260px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
    #sidebar h1 { padding: 16px; font-size: 1.1rem; border-bottom: 1px solid #ddd; }
    #new-btn { margin: 12px; padding: 8px; background: #0969da; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    #new-btn:hover { background: #0752b3; }
    #note-list { overflow-y: auto; flex: 1; }
    .note-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #eee; }
    .note-item:hover { background: #f0f6ff; }
    .note-item.active { background: #dbeafe; }
    .note-item .note-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item .note-date { font-size: 0.75rem; color: #888; margin-top: 2px; }

    /* Editor */
    #editor { flex: 1; display: flex; flex-direction: column; padding: 24px; gap: 12px; }
    #editor.empty { justify-content: center; align-items: center; color: #aaa; }
    #title-input { font-size: 1.4rem; font-weight: 700; border: none; border-bottom: 2px solid #e2e8f0; padding: 6px 0; outline: none; background: transparent; }
    #title-input:focus { border-bottom-color: #0969da; }
    #body-input { flex: 1; font-size: 1rem; border: none; outline: none; resize: none; background: transparent; line-height: 1.6; }
    #toolbar { display: flex; gap: 8px; justify-content: flex-end; }
    #save-btn { padding: 7px 18px; background: #0969da; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    #save-btn:hover { background: #0752b3; }
    #delete-btn { padding: 7px 18px; background: #fff; color: #cf222e; border: 1px solid #cf222e; border-radius: 6px; cursor: pointer; }
    #delete-btn:hover { background: #fff0f0; }
    #placeholder { font-size: 1rem; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>📝 Notes</h1>
    <button id="new-btn">+ New Note</button>
    <div id="note-list"></div>
  </div>

  <div id="editor" class="empty">
    <p id="placeholder">Select a note or create one.</p>
    <input id="title-input" type="text" placeholder="Title" style="display:none" />
    <textarea id="body-input" placeholder="Write something…" style="display:none"></textarea>
    <div id="toolbar" style="display:none">
      <button id="delete-btn">Delete</button>
      <button id="save-btn">Save</button>
    </div>
  </div>

  <script>
    let currentId = null;

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body: body ? JSON.stringify(body) : undefined,
      });
      return res.status === 204 ? null : res.json();
    }

    async function loadList() {
      const notes = await api('GET', '/notes');
      const list = document.getElementById('note-list');
      list.innerHTML = notes.map(n => `
        <div class="note-item ${n.id === currentId ? 'active' : ''}" data-id="${n.id}">
          <div class="note-title">${n.title || '(untitled)'}</div>
          <div class="note-date">${new Date(n.updated_at).toLocaleDateString()}</div>
        </div>
      `).join('');
      list.querySelectorAll('.note-item').forEach(el =>
        el.addEventListener('click', () => openNote(Number(el.dataset.id)))
      );
    }

    function showEditor(show) {
      document.getElementById('placeholder').style.display = show ? 'none' : '';
      document.getElementById('title-input').style.display = show ? '' : 'none';
      document.getElementById('body-input').style.display = show ? '' : 'none';
      document.getElementById('toolbar').style.display = show ? '' : 'none';
      document.getElementById('editor').classList.toggle('empty', !show);
    }

    async function openNote(id) {
      const note = await api('GET', `/notes/${id}`);
      currentId = note.id;
      document.getElementById('title-input').value = note.title;
      document.getElementById('body-input').value = note.body;
      showEditor(true);
      loadList();
    }

    document.getElementById('new-btn').addEventListener('click', async () => {
      const note = await api('POST', '/notes', { title: '', body: '' });
      await loadList();
      openNote(note.id);
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentId) return;
      await api('PUT', `/notes/${currentId}`, {
        title: document.getElementById('title-input').value,
        body: document.getElementById('body-input').value,
      });
      loadList();
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      if (!currentId || !confirm('Delete this note?')) return;
      await api('DELETE', `/notes/${currentId}`);
      currentId = null;
      showEditor(false);
      loadList();
    });

    // Auto-save on Ctrl+S / Cmd+S
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        document.getElementById('save-btn').click();
      }
    });

    loadList();
  </script>
</body>
</html>
