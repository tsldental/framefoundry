<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Non-Linear Debugging in framefoundry</title>
  <desc id="desc">A simplified diagram showing an original session branching into two alternative forks.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1180" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="mainCard" x1="120" y1="250" x2="540" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C4A6E" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#082F49" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="forkA" x1="730" y1="150" x2="1110" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D28D9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#312E81" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="forkB" x1="730" y1="430" x2="1110" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#059669" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#064E3B" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <rect x="32" y="32" width="1216" height="656" rx="28" stroke="#1E293B"/>

  <text x="92" y="100" fill="#A78BFA" font-size="18" font-family="Arial, sans-serif" letter-spacing="3">NON-LINEAR DEBUGGING</text>
  <text x="92" y="148" fill="#F8FAFC" font-size="42" font-weight="700" font-family="Arial, sans-serif">Rewind. Inspect. Fork. Refactor.</text>
  <text x="92" y="186" fill="#94A3B8" font-size="20" font-family="Arial, sans-serif">framefoundry lets you branch from any historical frame and explore multiple paths without losing the original run.</text>

  <rect x="112" y="262" width="420" height="156" rx="28" fill="url(#mainCard)" stroke="#0891B2" stroke-width="2"/>
  <text x="144" y="308" fill="#67E8F9" font-size="16" font-family="Arial, sans-serif" letter-spacing="2">ORIGINAL SESSION</text>
  <text x="144" y="350" fill="#F8FAFC" font-size="28" font-weight="700" font-family="Arial, sans-serif">Deterministic timeline</text>
  <text x="144" y="384" fill="#CBD5E1" font-size="18" font-family="Arial, sans-serif">User prompt → tool calls → assistant answer</text>

  <circle cx="596" cy="340" r="20" fill="#082F49" stroke="#22D3EE" stroke-width="6"/>
  <text x="568" y="386" fill="#67E8F9" font-size="18" font-weight="700" font-family="Arial, sans-serif">Frame X</text>

  <path d="M616 328C668 286 714 254 760 232" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/>
  <path d="M616 352C668 404 714 446 760 488" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>

  <rect x="760" y="154" width="368" height="118" rx="28" fill="url(#forkA)" stroke="#7C3AED" stroke-width="2"/>
  <text x="792" y="198" fill="#C4B5FD" font-size="16" font-family="Arial, sans-serif" letter-spacing="2">FORK A</text>
  <text x="792" y="236" fill="#F8FAFC" font-size="28" font-weight="700" font-family="Arial, sans-serif">Try a new prompt</text>
  <text x="792" y="264" fill="#DDD6FE" font-size="18" font-family="Arial, sans-serif">Explore an alternate implementation path.</text>

  <rect x="760" y="448" width="368" height="118" rx="28" fill="url(#forkB)" stroke="#10B981" stroke-width="2"/>
  <text x="792" y="492" fill="#6EE7B7" font-size="16" font-family="Arial, sans-serif" letter-spacing="2">FORK B</text>
  <text x="792" y="530" fill="#F8FAFC" font-size="28" font-weight="700" font-family="Arial, sans-serif">Refactor the reasoning</text>
  <text x="792" y="558" fill="#D1FAE5" font-size="18" font-family="Arial, sans-serif">Keep the same origin, but take a cleaner route.</text>

  <rect x="120" y="520" width="520" height="112" rx="24" fill="#0B1220" stroke="#334155"/>
  <text x="152" y="564" fill="#F8FAFC" font-size="24" font-weight="700" font-family="Arial, sans-serif">branch_root_frame_id preserves lineage</text>
  <text x="152" y="598" fill="#94A3B8" font-size="18" font-family="Arial, sans-serif">Every fork remembers the exact frame where the alternative path began.</text>
</svg>
